
<!DOCTYPE html>
<html lang="pt-br">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <link rel="stylesheet" href="/style.css">

</head>
<body>

    <div class="container">

        <h1>Sistema de Estoque</h1>

        <form id="formLogin">

            <input
                type="text"
                id="usuario"
                placeholder="Usuário"
                required
            >

            <input
                type="password"
                id="senha"
                placeholder="Senha"
                required
            >

            <button type="submit">
                Entrar
            </button>

        </form>

        <p id="mensagem"></p>

    </div>

    <script src="/login.js"></script>

</body>
</html>
